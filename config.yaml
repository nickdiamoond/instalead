apify:
  token_env_var: "APIFY_API_TOKEN"
  proxy:
    use_apify_proxy: true

  actors:
    universal: "apify/instagram-scraper"       # поиск юзеров, посты по directUrls
    comments: "apify/instagram-comment-scraper" # комментарии к посту/рилсу
    profile: "apify/instagram-profile-scraper"  # инфо профиля (аватарка, bio)
    hashtag: "apify/instagram-hashtag-scraper"  # посты/рилсы по хештегу
    posts: "apify/instagram-post-scraper"       # посты конкретного аккаунта

  test_limits:
    search_limit: 5       # макс. результатов поиска юзеров
    results_limit: 10     # макс. постов на хештег/аккаунт
    comments_limit: 15    # макс. комментов на пост

search:
  # Method 1: поиск по хештегам (через instagram-hashtag-scraper)
  hashtags:
    - "квартираспб"
    - "недвижимостьспб"
    - "новостройкиспб"
    - "купитьквартируспб"
    - "жильеспб"

  # Method 2: список аккаунтов риелторов СПБ (найдены в предыдущих тестах)
  realtor_accounts:
    - "oxana.realtor.spb"
    - "stasya_agent_spb"
    - "efimova_realtor"
    - "realon_an"
    - "gubanova_estate"

filters:
  min_views: 1000
  min_comments: 2
  min_post_age_hours: 6
  max_post_age_days: 14

cycle:
  interval_hours: 12
  max_apify_requests_per_cycle: 50
  max_accounts_per_cycle: 200

db:
  path: "data/leads.db"

# Face detection (SCRFD via InsightFace).
#
# We run TWO FaceEmbedder instances with different det_size canvases —
# avatars and post photos have very different recall characteristics:
#
#   * avatar_det_size: Instagram avatars come back as 320x320 thumbnails.
#     Running them through 640 upscales 2x and pushes "face fills frame"
#     selfies past SCRFD's largest anchor (~256 px), where recall drops.
#     320 = native size, no upscale, faces stay in the anchor sweet
#     spot. Confirmed via test_avatar_sort.py: ~zero false negatives on
#     1000+ real avatars at this size.
#   * post_det_size: feed photos can be 1080x1080+ with multiple smaller
#     faces (group shots, distant subjects). 640 gives wider anchor
#     coverage for those.
#
# min_det_score is shared. 0.6 was tuned via test_avatar_sort.py's
# threshold sweep — strict enough to drop background faces / posters
# in the frame, loose enough to keep real profile / side-view
# detections (typical confidence on real faces: 0.78-0.92).
face_detection:
  min_det_score: 0.6
  avatar_det_size: 320
  post_det_size: 640

# Face leader fallback: when avatar face count is not exactly 1, probe the
# last N post photos, keep only single-face ones, cluster them by cosine
# similarity, and promote the largest cluster (if it covers >= M photos)
# to the canonical face for the lead.
face_fallback:
  latest_posts_limit: 10       # N: how many of the most recent posts to probe
  min_cluster_size: 2         # M: leader cluster must cover at least this many photos
  cluster_threshold: 0.5      # cosine-similarity threshold for cluster_faces
  skip_videos: true           # ignore post items that are videoUrl-only
  keep_photos: false          # false = delete downloaded post photos after processing (keep only the chosen one)

logging:
  level: "INFO"
  pipeline_log_dir: "logs"
